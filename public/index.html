<!DOCTYPE html>
<html lang="en" style="-webkit-spatial-navigation: none;">
  <head>
    <meta charset="utf-8" />

    <!-- webOS TV viewport — use device native resolution for sharp text -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="BBNL IPTV — LG Smart TV" />

    <!-- PWA manifest (optional, harmless on TV) -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>BBNL IPTV</title>

    <style>
      /* ── Reset for webOS TV ──────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        -webkit-text-size-adjust: none;
        font-family: 'LG Display GP4', 'LG Smart UI', Roboto, 'Segoe UI', sans-serif;
        text-rendering: optimizeSpeed;
        -webkit-font-smoothing: subpixel-antialiased;
        font-weight: 500;
      }

      #root {
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* ── NUCLEAR: Kill ALL native focus/outline/border on every element ── */
      *, *:focus, *:focus-visible, *:focus-within, *:active {
        outline: none !important;
        outline-width: 0 !important;
        outline-style: none !important;
        outline-color: transparent !important;
        -webkit-tap-highlight-color: transparent !important;
        -webkit-focus-ring-color: transparent !important;
      }
      button::-webkit-focus-inner { border: 0; padding: 0; }

      /* Prevent tap-highlight on webOS */
      * { -webkit-tap-highlight-color: transparent; }

      /* backface-visibility removed — it causes blurry text on TV screens */

      /* ── Hide scrollbar (TV apps should never show scrollbars) ─────── */
      .hide-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
      .hide-scrollbar::-webkit-scrollbar { display: none; width: 0; height: 0; }

      /* ── TV DOM Focus Engine ─────────────────────────────────────────── */
      /* Focus/hover applied via DOM attribute manipulation — zero React re-renders */

      /* NO transition on focusable items — instant response on LG webOS */
      [class^="focusable-"],
      [class*=" focusable-"] {
        outline: none;
      }

      /* Sidebar channel items — border only, no background */
      .focusable-sidebar-item[data-focused="true"] {
        background-color: transparent !important;
        border: 2px solid #60a5fa !important;
        outline: none !important;
      }

      /* Category tabs */
      .focusable-category-tab[data-focused="true"] {
        border: 2px solid #60a5fa !important;
        outline: none !important;
      }

      /* Language cards — no transform to keep text sharp on TV */
      .focusable-language-card[data-focused="true"] {
        border: 4px solid rgba(255,255,255,0.9) !important;
      }
      .focusable-language-card[data-hovered="true"]:not([data-focused="true"]) {
        border: 3px solid rgba(255,255,255,0.3) !important;
      }

      /* Generic buttons (category tabs, OTT, etc.) — no transform to keep text sharp */
      .focusable-button[data-focused="true"] {
        border: 3px solid #fff !important;
        box-shadow: none !important;
      }
      .focusable-button[data-hovered="true"]:not([data-focused="true"]) {
        border: 3px solid rgba(255,255,255,0.3) !important;
      }

      /* Input / textarea */
      .focusable-input[data-focused="true"] {
        border: 3px solid #667eea !important;
      }

      /* Icon buttons (home sidebar icons) — focus = red tint */
      .focusable-icon-button[data-focused="true"] {
        background: rgba(236,25,70,0.25) !important;
        color: #EC1946 !important;
        border: 2px solid #EC1946 !important;
        border-radius: 14px !important;
      }
      .focusable-icon-button[data-hovered="true"]:not([data-focused="true"]) {
        background: rgba(255,255,255,0.06) !important;
        color: #aaa !important;
      }

      /* Settings menu items — no transform */
      .focusable-settings-item[data-focused="true"] {
        border: 3px solid #667eea !important;
      }
      .focusable-settings-item[data-logout="true"][data-focused="true"] {
        border: 3px solid #f44336 !important;
      }
    </style>

    <!--
      CRITICAL — webOSTV.js must be loaded SYNCHRONOUSLY before React boots.
      Using a LOCAL copy (./webOSTV.js) so the app works even when the TV
      has no internet access.  On a real LG TV, window.webOS already exists
      and the stub inside webOSTV.js skips itself automatically.
    -->
    <script src="%PUBLIC_URL%/webOSTV.js"></script>
  </head>

  <body>
    <noscript>JavaScript must be enabled to run BBNL IPTV.</noscript>
    <div id="root"></div>
  </body>
</html>
